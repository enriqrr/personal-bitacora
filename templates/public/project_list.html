{% extends "base.html" %}

{% block title %}Projects{% endblock %}

{% block content %}
  <h1>Projects</h1>
  {% if projects %}
    <ul>
      {% for project in projects %}
        <li>
          <a href="{% url 'bitacora:public_project_detail' slug=project.slug %}">{{ project.name }}</a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No public projects yet.</p>
  {% endif %}
{% endblock %}
