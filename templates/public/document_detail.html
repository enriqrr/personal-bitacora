{% extends "base.html" %}

{% block title %}{{ document.title }}{% endblock %}

{% block content %}
  <h1>{{ document.title }}</h1>
  <dl>
    <dt>Type</dt>
    <dd>{{ document.document_type }}</dd>
    <dt>Status</dt>
    <dd>{{ document.status }}</dd>
  </dl>
  <article>
    {{ rendered_body|safe }}
  </article>
{% endblock %}
