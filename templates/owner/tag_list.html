{% extends "base.html" %}

{% block title %}Tags{% endblock %}

{% block content %}
  <h1>Tags</h1>
  <p><a href="{% url 'bitacora:owner_tag_create' %}">Create tag</a></p>
  {% if tags %}
    <ul>
      {% for tag in tags %}
        <li>
          <a href="{% url 'bitacora:owner_tag_detail' slug=tag.slug %}">{{ tag.name }}</a>
          <span>{{ tag.visibility }}</span>
          {% if tag.is_archived %}<span>ARCHIVED</span>{% endif %}
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No tags yet.</p>
  {% endif %}
{% endblock %}
