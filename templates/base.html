<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Personal Bitacora{% endblock %}</title>
  </head>
  <body>
    <header>
      <nav aria-label="Primary navigation">
        <a href="{% url 'bitacora:home' %}">Home</a>
        <a href="{% url 'bitacora:public_project_list' %}">Projects</a>
        {% if user.is_authenticated %}
          <a href="{% url 'bitacora:dashboard' %}">Dashboard</a>
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit">Log out</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}">Log in</a>
        {% endif %}
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
